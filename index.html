<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex AI Hiring</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
        body{background:#050505;color:white;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
        .background{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at top left,#8b5cf650,transparent 35%),radial-gradient(circle at bottom right,#6d28d950,transparent 35%);z-index:-1;}
        header{text-align:center;padding:50px 20px;}
        .logo{width:150px;margin-bottom:10px;}
        h1{font-size:50px;margin-bottom:10px;background:linear-gradient(to right,#fff,#b794ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .application-card{width:90%;max-width:600px;background:rgba(20,20,20,0.8);padding:40px;border-radius:20px;border:1px solid rgba(139,92,246,0.3);backdrop-filter:blur(10px);}
        label{display:block;margin:15px 0 5px;color:#ccc;font-size:14px;}
        input,select,textarea{width:100%;padding:12px;border-radius:10px;background:#111;color:white;border:1px solid #333;outline:none;}
        input:focus,textarea:focus{border-color:#8b5cf6;}
        button{width:100%;margin-top:25px;padding:15px;border:none;border-radius:10px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:white;font-weight:bold;cursor:pointer;transition:0.3s;}
        button:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(139,92,246,0.4);}
        button:disabled{background:#444;cursor:not-allowed;}
    </style>
</head>
<body>
    <div class="background"></div>
    <header>
        <img src="Apexailogo.png" alt="Logo" class="logo">
        <h1>Apex AI</h1>
        <p>Join our team and help build the future.</p>
    </header>

    <section class="application-card">
        <form id="applyForm">
            <label>Full Name</label>
            <input type="text" id="userName" required>
            <label>Email Address</label>
            <input type="email" id="userEmail" required>
            <label>Position</label>
            <select id="userPosition" required>
                <option value="">Select...</option>
                <option value="Ideas">Ideas</option>
                <option value="Programmer">Programmer</option>
                <option value="Art">Art</option>
            </select>
            <label>Experience</label>
            <textarea id="userExperience" required></textarea>
            <button type="submit" id="submitBtn">Submit Application</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
